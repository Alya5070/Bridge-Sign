<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial | Bridge Sign</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
    {% include '_navbar.html' %}
    {% include '_sidebar.html' %}

    <main id="main-content" class="lg:ml-64 pt-28 pb-12 px-8 max-w-[1400px] transition-all duration-300">
        <div class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold text-white mb-2">Interactive Tutorial</h1>
                <p id="instruction-text" class="text-lg text-slate-400">Follow the guide to learn basic sign language characters.</p>
            </div>
            <button onclick="skipTutorial()" class="bg-white/5 hover:bg-white/10 text-slate-300 px-6 py-2 rounded-xl font-bold text-sm border border-white/10 transition-all active:scale-95">
                Skip to Dashboard
            </button>
        </div>

        <div class="grid grid-cols-12 gap-8 h-[calc(100vh-280px)]">
            <!-- Camera Section -->
            <div class="col-span-12 lg:col-span-7 surface_glass rounded-3xl overflow-hidden flex flex-col glow-indigo">
                <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-indigo-400">videocam</span>
                        <h3 class="text-xl font-bold text-white">Live Camera Feed</h3>
                    </div>
                    <div class="bg-indigo-950/60 border border-white/10 px-6 py-3 rounded-2xl text-center min-w-[120px]">
                        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Target Sign</span>
                        <div id="target-letter" class="text-4xl font-black text-indigo-400 leading-none">A</div>
                        <div class="w-full h-1.5 bg-white/5 rounded-full mt-3 overflow-hidden">
                            <div id="progress-bar" class="h-full bg-green-500 transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="flex-1 bg-black relative flex items-center justify-center">
                    <img src="{{ url_for('video_feed') }}" alt="Camera Feed" class="max-w-full max-height-full object-contain">
                </div>
            </div>

            <!-- Guide Section -->
            <div class="col-span-12 lg:col-span-5 surface_glass rounded-3xl overflow-hidden flex flex-col glow-indigo">
                <div class="p-6 border-b border-white/10 flex items-center gap-3 bg-white/5">
                    <span class="material-symbols-outlined text-purple-400">menu_book</span>
                    <h3 class="text-xl font-bold text-white">Visual Guide</h3>
                </div>
                <div class="flex-1 overflow-y-auto p-8 bg-black/20 flex items-center justify-center">
                    <img src="{{ url_for('static', filename='images/sign_language_guide.png') }}"
                        alt="Sign Language Alphabet Guide" class="max-w-full rounded-2xl shadow-2xl"
                        onerror="this.onerror=null; this.src='https://via.placeholder.com/800x1000/0f172a/94a3b8?text=Guide+Image+Not+Found';">
                </div>
            </div>
        </div>
    </main>

    <script>
        const targetLetters = ['A', 'B', 'C', 'D'];
        let currentIndex = 0;
        let consecutiveMatches = 0;
        const REQUIRED_MATCHES = 5;

        const targetLetterEl = document.getElementById('target-letter');
        const progressBar = document.getElementById('progress-bar');
        const instructionText = document.getElementById('instruction-text');

        function updateUI() {
            if (currentIndex < targetLetters.length) {
                targetLetterEl.textContent = targetLetters[currentIndex];
                const progressPct = (consecutiveMatches / REQUIRED_MATCHES) * 100;
                progressBar.style.width = `${progressPct}%`;
            } else {
                targetLetterEl.textContent = '🎉';
                progressBar.style.width = '100%';
                instructionText.textContent = "Tutorial Complete! Redirecting to Dashboard...";
            }
        }

        async function pollPrediction() {
            if (currentIndex >= targetLetters.length) return;
            try {
                const response = await fetch('/get_prediction');
                const data = await response.json();
                if (data.prediction && data.prediction.toUpperCase() === targetLetters[currentIndex]) {
                    consecutiveMatches++;
                    if (consecutiveMatches >= REQUIRED_MATCHES) {
                        currentIndex++;
                        consecutiveMatches = 0;
                        if (currentIndex >= targetLetters.length) {
                            updateUI();
                            completeTutorial();
                            return;
                        }
                    }
                } else {
                    consecutiveMatches = Math.max(0, consecutiveMatches - 1);
                }
                updateUI();
            } catch (error) { console.error('Error fetching prediction:', error); }
        }

        async function completeTutorial() {
            try {
                const response = await fetch('/complete_tutorial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    setTimeout(() => { window.location.href = "{{ url_for('index') }}"; }, 2500);
                }
            } catch (error) { console.error('Error completing tutorial:', error); }
        }

        async function skipTutorial() {
            try {
                const response = await fetch('/complete_tutorial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) { window.location.href = "{{ url_for('index') }}"; }
            } catch (error) { console.error('Error skipping tutorial:', error); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await fetch('/switch_mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'spelling' })
                });
            } catch (e) { console.error('Failed to init tutorial mode:', e); }
            setInterval(pollPrediction, 200);
            updateUI();
        });
    </script>
</body>
</html>
