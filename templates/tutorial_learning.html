<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning | Bridge Sign</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}?v=2">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern_ui.css') }}">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .guide-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
        }
        .guide-container.expanded {
            max-height: 1000px;
        }
    </style>
</head>
<body class="bg-background text-on-surface">
    {% include '_navbar.html' %}
    {% include '_sidebar.html' %}

    <main id="main-content" class="lg:ml-64 pt-28 pb-12 px-8 max-w-[1400px] mx-auto transition-all duration-300">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-extrabold text-white mb-2 capitalize">Level: {{ level }}</h1>
                <p id="instruction-text" class="text-lg text-slate-400">Follow the guide to learn and perform the signs.</p>
            </div>
            <button onclick="skipTutorial()" class="bg-white/5 hover:bg-white/10 text-slate-300 px-6 py-2 rounded-xl font-bold text-sm border border-white/10 transition-all active:scale-95">
                Skip to Dashboard
            </button>
        </div>

        <div class="grid grid-cols-12 gap-8">
            <!-- Camera Section -->
            <div class="col-span-12 lg:col-span-7 surface_glass rounded-3xl overflow-hidden flex flex-col glow-indigo border border-white/10">
                <div class="p-6 border-b border-white/10 flex justify-between items-center bg-white/5">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-indigo-400">videocam</span>
                        <h3 class="text-xl font-bold text-white">Live Camera Feed</h3>
                    </div>
                    <div class="w-1/3">
                        <div class="flex justify-between text-xs text-slate-400 font-bold mb-1">
                            <span>Progress</span>
                            <span id="progress-text">0%</span>
                        </div>
                        <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-300" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="flex-1 bg-black relative flex items-center justify-center min-h-[480px]">
                    <img src="{{ url_for('video_feed') }}" alt="Camera Feed" class="max-w-full max-h-full object-contain">
                </div>
            </div>

            <!-- Info Section -->
            <div class="col-span-12 lg:col-span-5 flex flex-col gap-6">
                <!-- Target Box -->
                <div class="surface_glass rounded-3xl overflow-hidden p-8 border border-white/10 flex flex-col items-center text-center relative glow-purple">
                    <span class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Current Target</span>
                    <div id="target-letter" class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 leading-none mb-6">
                        ...
                    </div>
                    
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6 w-full text-left">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="material-symbols-outlined text-purple-400 text-sm">info</span>
                            <h4 class="text-white font-bold text-sm uppercase tracking-wider">How to do it</h4>
                        </div>
                        <p id="target-description" class="text-slate-300 leading-relaxed text-sm">
                            Loading description...
                        </p>
                    </div>
                </div>

                <!-- Visual Guide Toggle (Only for Basics) -->
                {% if level == 'basics' %}
                <div class="surface_glass rounded-3xl overflow-hidden p-6 border border-white/10">
                    <button id="guide-toggle-btn" class="w-full flex justify-between items-center bg-white/5 hover:bg-white/10 p-4 rounded-xl border border-white/10 transition-all font-bold text-white group">
                        <span class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-indigo-400 group-hover:scale-110 transition-transform">menu_book</span>
                            Show Visual Guide
                        </span>
                        <span class="material-symbols-outlined transition-transform duration-300" id="guide-icon">expand_more</span>
                    </button>
                    
                    <div id="guide-container" class="guide-container mt-4">
                        <img src="{{ url_for('static', filename='images/sign_language_guide.png') }}"
                            alt="Sign Language Alphabet Guide" class="w-full rounded-2xl shadow-2xl border border-white/10"
                            onerror="this.onerror=null; this.src='https://via.placeholder.com/800x1000/0f172a/94a3b8?text=Guide+Image+Not+Found';">
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
    </main>

    <script>
        const descriptions = {
            "A": "Ball up your hand into a fist with your thumb pressing the side of your index finger.",
            "B": "Hold up your hand as if you're waving, press your fingers together, and fold your thumb across your palm.",
            "C": "Curve your fingers and thumb to form the shape of a \"C.\"",
            "D": "Point your index finger straight up and touch the tips of your other three fingers to your thumb.",
            "E": "Curl all your fingers inward so the tips rest on top of your thumb, which is tucked into the palm.",
            "F": "Touch the tips of your index finger and thumb together (forming a circle) and hold the other three fingers up and spread apart.",
            "G": "Point your index finger and thumb sideways, parallel to each other, with the thumb below the index finger.",
            "H": "Point your index and middle fingers sideways together, with your thumb tucked behind them.",
            "I": "Raise your pinky finger straight up and keep the rest of your hand in a fist.",
            "J": "Raise your pinky finger and trace the letter \"J\" in the air.",
            "K": "Raise your index and middle fingers (like a \"V\"), and place your thumb against the middle joint of your index finger.",
            "L": "Extend your index finger up and your thumb out to form an \"L\" shape.",
            "M": "Fold your index, middle, and ring fingers over your thumb.",
            "N": "Fold only your index and middle fingers over your thumb.",
            "O": "Curve all your fingers so their tips touch your thumb, forming a circle.",
            "P": "Form the \"K\" shape but point your index finger straight toward the ground.",
            "Q": "Form the \"G\" shape but point your index finger and thumb toward the ground.",
            "R": "Cross your index and middle fingers.",
            "S": "Make a fist and wrap your thumb across the front of your fingers.",
            "T": "Make a fist and tuck your thumb under your index finger so it pokes through between the index and middle fingers.",
            "U": "Hold your index and middle fingers together and point them straight up.",
            "V": "Hold your index and middle fingers apart (like a peace sign) and point them up.",
            "W": "Extend your index, middle, and ring fingers upward and spread them apart.",
            "X": "Make a fist and curl your index finger into a hook.",
            "Y": "Extend your thumb and pinky finger out while keeping the middle three fingers folded into your palm.",
            "Z": "Extend your index finger and \"draw\" the letter \"Z\" in the air.",
            "MAKAN": "Perform the dynamic gesture for Makan.",
            "SAYA SAYANG AWAK": "Perform the sequence or dynamic gesture for Saya Sayang Awak.",
            "AKU MAHU MAKAN": "Perform the sentence Aku Mahu Makan."
        };

        const targetSequence = {{ sequence|tojson }};
        const level = "{{ level }}";
        let currentIndex = 0;
        let consecutiveMatches = 0;
        const REQUIRED_MATCHES = level === 'basics' ? 5 : 8; // Require more frames for words

        const targetLetterEl = document.getElementById('target-letter');
        const targetDescEl = document.getElementById('target-description');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        
        // Guide toggle logic
        const toggleBtn = document.getElementById('guide-toggle-btn');
        const guideContainer = document.getElementById('guide-container');
        const guideIcon = document.getElementById('guide-icon');
        
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                guideContainer.classList.toggle('expanded');
                if (guideContainer.classList.contains('expanded')) {
                    guideIcon.style.transform = 'rotate(180deg)';
                    toggleBtn.querySelector('span:first-child').innerHTML = '<span class="material-symbols-outlined text-indigo-400 group-hover:scale-110 transition-transform">menu_book</span> Hide Visual Guide';
                } else {
                    guideIcon.style.transform = 'rotate(0deg)';
                    toggleBtn.querySelector('span:first-child').innerHTML = '<span class="material-symbols-outlined text-indigo-400 group-hover:scale-110 transition-transform">menu_book</span> Show Visual Guide';
                }
            });
        }

        function updateUI() {
            if (currentIndex < targetSequence.length) {
                const target = targetSequence[currentIndex];
                targetLetterEl.textContent = target;
                targetDescEl.textContent = descriptions[target] || "Perform the sign for " + target;
                
                const overallProgress = (currentIndex / targetSequence.length) * 100;
                progressBar.style.width = `${overallProgress}%`;
                progressText.textContent = `${Math.round(overallProgress)}%`;
            } else {
                targetLetterEl.textContent = '🎉';
                targetDescEl.textContent = "Level complete! Redirecting...";
                progressBar.style.width = '100%';
                progressText.textContent = '100%';
            }
        }

        async function pollPrediction() {
            if (currentIndex >= targetSequence.length) return;
            try {
                const response = await fetch('/get_prediction');
                const data = await response.json();
                
                const currentTarget = targetSequence[currentIndex].toUpperCase();
                
                // Allow matches from either static or dynamic predictions
                let isMatch = false;
                if (data.prediction && data.prediction.toUpperCase() === currentTarget) isMatch = true;
                if (data.dynamic_prediction && data.dynamic_prediction.toUpperCase() === currentTarget) isMatch = true;

                if (isMatch) {
                    consecutiveMatches++;
                    if (consecutiveMatches >= REQUIRED_MATCHES) {
                        currentIndex++;
                        consecutiveMatches = 0;
                        if (currentIndex >= targetSequence.length) {
                            updateUI();
                            setTimeout(() => {
                                window.location.href = "{{ url_for('tutorial_success') }}";
                            }, 1000);
                            return;
                        }
                    }
                } else {
                    consecutiveMatches = Math.max(0, consecutiveMatches - 1);
                }
                updateUI();
            } catch (error) { console.error('Error fetching prediction:', error); }
        }

        async function skipTutorial() {
            try {
                const response = await fetch('/complete_tutorial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) { window.location.href = "{{ url_for('index') }}"; }
            } catch (error) { console.error('Error skipping tutorial:', error); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const mode = level === 'basics' ? 'spelling' : 'words';
            try {
                await fetch('/switch_mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: mode })
                });
            } catch (e) { console.error('Failed to switch mode:', e); }
            setInterval(pollPrediction, 200);
            updateUI();
        });
    </script>
</body>
</html>
