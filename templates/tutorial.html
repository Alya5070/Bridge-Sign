<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial - Bridge Sign</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #6366f1;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Dynamic Background */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #4f46e5;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #c026d3;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 50px) scale(1.2);
            }
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }

        /* Navigation */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            margin: 1.5rem;
            z-index: 10;
        
        flex-wrap: nowrap;
        overflow-x: auto;}

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .navbar-menu {
            display: flex;
            gap: 1rem;
        }

        .navbar-item {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
        
        white-space: nowrap;}

        .navbar-item:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .navbar-item.active {
            color: #fff;
            background: rgba(79, 70, 229, 0.3);
            border: 1px solid rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.4);
        }

        .navbar-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fff;
        }

        /* Main Container for Tutorial Split View */
        .tutorial-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem 2rem 1.5rem;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 1.5rem;
            height: calc(100vh - 120px);
        }

        @media (max-width: 1024px) {
            .tutorial-container {
                grid-template-columns: 1fr;
                height: auto;
                min-height: auto;
            }
        }

        /* Camera Feed Style */
        .camera-section {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            border-radius: 0 0 20px 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .section-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .section-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Guide Style */
        .guide-section {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        .guide-container {
            flex: 1;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 0 0 20px 20px;
            overflow: auto;
        }

        .guide-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
</head>

<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

        {% include '_navbar.html' %}<div class="tutorial-container">
        <!-- Live Camera Feed -->
        <div class="camera-section glass-panel">
            <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        Live Camera Feed
                    </h2>
                    <p id="instruction-text" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem;">
                        Follow the guide to interpret the sign
                    </p>
                    <button onclick="skipTutorial()"
                        style="margin-top: 0.8rem; padding: 0.4rem 1rem; background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s;">
                        Skip to Dashboard
                    </button>
                </div>
                <div
                    style="text-align: right; background: rgba(0,0,0,0.2); padding: 0.5rem 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
                    <span
                        style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Target
                        Sign</span>
                    <div id="target-letter"
                        style="font-size: 2.5rem; font-weight: bold; color: var(--primary); line-height: 1.2;">A</div>
                    <div
                        style="width: 80px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 0.5rem; overflow: hidden;">
                        <div id="progress-bar"
                            style="width: 0%; height: 100%; background: #34d399; transition: width 0.2s;"></div>
                    </div>
                </div>
            </div>
            <div class="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Camera Feed" class="video-feed" id="liveCamera">
            </div>
        </div>

        <!-- Static Visual Guide -->
        <div class="guide-section glass-panel">
            <div class="section-header">
                <h2>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    Visual Guide
                </h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.3rem;">Learn the alphabet hand
                    signs</p>
            </div>
            <div class="guide-container">
                <img src="{{ url_for('static', filename='images/sign_language_guide.png') }}"
                    alt="Sign Language Alphabet Guide" class="guide-image"
                    onerror="this.onerror=null; this.src='https://via.placeholder.com/800x1000/0f172a/94a3b8?text=Image+Not+Found+-+Please+save+sign_language_guide.png+to+static/images/';">
            </div>
        </div>
    </div>

    <!-- Interactive Tutorial Logic -->
    <script>
        const targetLetters = ['A', 'B', 'C', 'D'];
        let currentIndex = 0;
        let consecutiveMatches = 0;
        const REQUIRED_MATCHES = 5;

        const targetLetterEl = document.getElementById('target-letter');
        const progressBar = document.getElementById('progress-bar');
        const instructionText = document.getElementById('instruction-text');

        function updateUI() {
            if (currentIndex < targetLetters.length) {
                targetLetterEl.textContent = targetLetters[currentIndex];
                const progressPct = (consecutiveMatches / REQUIRED_MATCHES) * 100;
                progressBar.style.width = `${progressPct}%`;
            } else {
                targetLetterEl.textContent = '🎉';
                progressBar.style.width = '100%';
                instructionText.textContent = "Tutorial Complete! Redirecting to Dashboard...";
            }
        }

        async function pollPrediction() {
            if (currentIndex >= targetLetters.length) return;

            try {
                const response = await fetch('/get_prediction');
                const data = await response.json();

                if (data.prediction && data.prediction.toUpperCase() === targetLetters[currentIndex]) {
                    consecutiveMatches++;
                    if (consecutiveMatches >= REQUIRED_MATCHES) {
                        currentIndex++;
                        consecutiveMatches = 0;
                        if (currentIndex >= targetLetters.length) {
                            updateUI();
                            completeTutorial();
                            return;
                        }
                    }
                } else {
                    consecutiveMatches = Math.max(0, consecutiveMatches - 1);
                }
                updateUI();
            } catch (error) {
                console.error('Error fetching prediction:', error);
            }
        }

        async function completeTutorial() {
            try {
                const response = await fetch('/complete_tutorial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    setTimeout(() => {
                        window.location.href = "{{ url_for('index') }}";
                    }, 2500);
                }
            } catch (error) {
                console.error('Error completing tutorial:', error);
            }
        }

        async function skipTutorial() {
            try {
                const btn = document.querySelector('button[onclick="skipTutorial()"]');
                if (btn) btn.textContent = "Skipping...";
                const response = await fetch('/complete_tutorial', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (response.ok) {
                    window.location.href = "{{ url_for('index') }}";
                }
            } catch (error) {
                console.error('Error skipping tutorial:', error);
            }
        }

        // Initialize tutorial by forcing backend into spelling mode
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await fetch('/switch_mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode: 'spelling' })
                });
            } catch (e) { console.error('Failed to init tutorial mode:', e); }

            // Start polling every 200ms
            setInterval(pollPrediction, 200);
            updateUI();
        });
    </script>
</body>

</html>
